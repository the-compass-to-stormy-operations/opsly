services:

  # --- Infrastructure ---

  mongodb:
    image: mongo:7
    container_name: zenandops-mongodb
    ports:
      - "${MONGODB_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - zenandops-net

  kafka:
    image: apache/kafka:3.9.0
    container_name: zenandops-kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: ZenAndOpsKafkaClusterId01
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - zenandops-net

  # --- Backend Services ---

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: zenandops/auth-service:${ZENANDOPS_VERSION}
    container_name: zenandops-auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:8081"
    environment:
      QUARKUS_HTTP_PORT: 8081
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://${MONGODB_ROOT_USERNAME}:${MONGODB_ROOT_PASSWORD}@mongodb:27017
      QUARKUS_MONGODB_DATABASE: ${AUTH_DB_NAME}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: ${JWT_PUBLIC_KEY_LOCATION}
      MP_JWT_VERIFY_ISSUER: ${JWT_ISSUER}
      SMALLRYE_JWT_SIGN_KEY_LOCATION: ${JWT_PRIVATE_KEY_LOCATION}
      SMALLRYE_JWT_NEW_TOKEN_ISSUER: ${JWT_ISSUER}
      ZENANDOPS_JWT_ISSUER: ${JWT_ISSUER}
      ZENANDOPS_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
      ZENANDOPS_JWT_REFRESH_TOKEN_EXPIRATION_HOURS: ${JWT_REFRESH_TOKEN_EXPIRATION_HOURS}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - zenandops-net

  dashboard-service:
    build:
      context: ./dashboard-service
      dockerfile: Dockerfile
    image: zenandops/dashboard-service:${ZENANDOPS_VERSION}
    container_name: zenandops-dashboard-service
    ports:
      - "${DASHBOARD_SERVICE_PORT}:8082"
    environment:
      QUARKUS_HTTP_PORT: 8082
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: ${JWT_PUBLIC_KEY_LOCATION}
      MP_JWT_VERIFY_ISSUER: ${JWT_ISSUER}
    networks:
      - zenandops-net

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    image: zenandops/gateway-service:${ZENANDOPS_VERSION}
    container_name: zenandops-gateway-service
    ports:
      - "${GATEWAY_SERVICE_PORT}:8080"
    environment:
      QUARKUS_HTTP_PORT: 8080
      GATEWAY_AUTH_SERVICE_URL: ${GATEWAY_AUTH_SERVICE_URL}
      GATEWAY_DASHBOARD_SERVICE_URL: ${GATEWAY_DASHBOARD_SERVICE_URL}
      GATEWAY_RATE_LIMIT_MAX_REQUESTS: ${GATEWAY_RATE_LIMIT_MAX_REQUESTS}
      GATEWAY_RATE_LIMIT_WINDOW_SECONDS: ${GATEWAY_RATE_LIMIT_WINDOW_SECONDS}
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: ${JWT_PUBLIC_KEY_LOCATION}
      MP_JWT_VERIFY_ISSUER: ${JWT_ISSUER}
    depends_on:
      auth-service:
        condition: service_started
      dashboard-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/q/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zenandops-net

  # --- Frontend ---

  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_URL: http://localhost:${GATEWAY_SERVICE_PORT}
    image: zenandops/frontend-app:${ZENANDOPS_VERSION}
    container_name: zenandops-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      gateway-service:
        condition: service_healthy
    networks:
      - zenandops-net

volumes:
  mongodb-data:

networks:
  zenandops-net:
    driver: bridge
